# llm-proxy 配置示例

providers:
  # Anthropic (原生 Messages API) — 启用 thinking 模式
  - name: anthropic-main
    type: anthropic
    api_key: ${ANTHROPIC_API_KEY}
    models:
      - id: claude-sonnet-4-20250514
        thinking:
          budget_tokens: 8192          # 启用 thinking，设置 token 预算
      - id: claude-3-haiku-20240307     # 无 thinking 配置，使用默认行为

  # OpenAI (Chat Completions API) — 设置 reasoning_effort
  - name: openai-main
    type: openai
    api_key: ${OPENAI_API_KEY}
    models:
      - id: o3-mini
        reasoning_effort: medium       # low | medium | high
      - id: gpt-4o

  # OpenAI 兼容协议 (如 DeepSeek, Groq 等)
  - name: deepseek
    type: openai
    api_key: ${DEEPSEEK_API_KEY}
    api_base: https://api.deepseek.com
    models:
      - id: deepseek-chat

  # OpenAI Responses API
  - name: openai-responses
    type: openai-responses
    api_key: ${OPENAI_API_KEY}
    models:
      - id: o3-mini
        reasoning_effort: high
