name: Release macOS App

on:
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'app/**'
      - 'src/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && !contains(github.event.pull_request.title, '[skip app]'))

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: bash app/scripts/build.sh

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Calculate SHA256
        id: sha
        run: |
          SHA=$(shasum -a 256 app/.build/LLMProxy.dmg | cut -d' ' -f1)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: LLMProxy v${{ steps.version.outputs.version }}
          body: |
            ## LLMProxy v${{ steps.version.outputs.version }}

            macOS desktop app with built-in llm-proxy.

            ### Install
            Download `LLMProxy.dmg`, drag to `/Applications`.

            Or via Homebrew:
            ```bash
            brew install --cask maplezzk/tap/llm-proxy
            ```
          files: app/.build/LLMProxy.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha }}"

          git clone https://x-access-token:${{ secrets.TAP_REPO_PAT }}@github.com/maplezzk/homebrew-tap.git tap-repo
          cd tap-repo

          cat > Casks/llm-proxy.rb << EOF
          cask "llm-proxy" do
            version "$VERSION"
            sha256 "$SHA"

            url "https://github.com/maplezzk/llm-proxy/releases/download/v#{version}/LLMProxy-v#{version}.dmg"
            name "LLMProxy"
            desc "macOS desktop app for llm-proxy — multi-protocol LLM proxy"
            homepage "https://github.com/maplezzk/llm-proxy"

            depends_on macos: ">= :ventura"

            app "LLMProxy.app"

            zap trash: [
              "~/Library/Preferences/com.maplezzk.llm-proxy.plist",
            ]
          end
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/llm-proxy.rb
          git rm -f Casks/llm-proxy-menubar.rb 2>/dev/null || true
          git commit -m "chore: update llm-proxy cask to v$VERSION" || echo "no changes"
          git push origin main
