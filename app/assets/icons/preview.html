<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-proxy Icons</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; padding: 32px; background: #f8f9fa; color: #1a1a2e; }
  h1 { font-size: 20px; margin-bottom: 4px; }
  .spec { color: #666; font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .item { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 16px 8px 8px; text-align: center; }
  .item svg { display: block; margin: 0 auto 8px; }
  .item .label { font-size: 11px; color: #888; }
  .dark { background: #1a1a2e; border-radius: 12px; padding: 24px; margin-top: 16px; }
  .dark h2 { color: #e5e7eb; font-size: 15px; margin-bottom: 12px; }
  .dark .grid .item { background: #2d2d44; border-color: #3d3d54; }
  .dark .item .label { color: #999; }
  .dark svg { color: #e5e7eb; }
  h2 { font-size: 15px; margin: 24px 0 12px; }
</style>
</head>
